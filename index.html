<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMAQUET — Liga Fantasy 25/26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c17;
  --bg2: #0d1220;
  --bg3: #121828;
  --border: #1e2a3a;
  --accent: #f59e0b;
  --accent2: #e08500;
  --text: #e8edf5;
  --text2: #8a9bb0;
  --text3: #4a5a70;
  --pt: #f59e0b;
  --df: #3b82f6;
  --mc: #22c55e;
  --dl: #ef4444;
  --md: #8b5cf6;
  --green: #22c55e;
  --red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

/* HEADER */
header {
  background: linear-gradient(135deg, #080c17 0%, #0d1525 50%, #080c17 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky; top:0; z-index:100;
  backdrop-filter: blur(20px);
}
.header-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--accent); letter-spacing:3px; }
.logo span { color:var(--text2); font-size:0.9rem; font-family:'DM Sans',sans-serif; letter-spacing:1px; margin-left:12px; font-weight:300; }
.status-badge { display:flex; align-items:center; gap:8px; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); border-radius:20px; padding:6px 14px; font-size:0.75rem; color:var(--green); }
.status-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* NAV */
nav { max-width:1400px; margin:0 auto; padding:0 2rem; display:flex; gap:4px; border-bottom:1px solid var(--border); }
.nav-btn { font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; color:var(--text2); background:none; border:none; padding:14px 18px; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; letter-spacing:0.5px; }
.nav-btn:hover { color:var(--text); }
.nav-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* MAIN */
main { max-width:1400px; margin:0 auto; padding:2rem; }

/* SECTION */
.section { display:none; }
.section.active { display:block; }

/* LOADING */
.loading {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:80px; gap:20px; color:var(--text2);
}
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* STATS BAR */
.stats-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1px; background:var(--border); border-radius:12px; overflow:hidden; margin-bottom:2rem; }
.stat-card { background:var(--bg2); padding:1.2rem 1.5rem; }
.stat-label { font-size:0.7rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.stat-value { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--text); letter-spacing:1px; }
.stat-sub { font-size:0.75rem; color:var(--text2); margin-top:2px; }

/* FILTERS */
.filters { display:flex; gap:12px; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center; }
.search-box { flex:1; min-width:200px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
.search-box:focus { border-color:var(--accent); }
.search-box::placeholder { color:var(--text3); }
.filter-btn { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 16px; color:var(--text2); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.filter-btn:hover, .filter-btn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
.sort-select { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:10px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; outline:none; }

/* TABLE */
.table-wrap { background:var(--bg2); border-radius:12px; overflow:hidden; border:1px solid var(--border); }
.table-header { display:grid; grid-template-columns: 40px 2fr 80px 1fr 100px 100px 80px 80px 80px; gap:0; padding:12px 16px; background:var(--bg3); border-bottom:1px solid var(--border); }
.th { font-size:0.7rem; color:var(--text3); text-transform:uppercase; letter-spacing:1px; font-weight:600; cursor:pointer; user-select:none; }
.th:hover { color:var(--text2); }
.th.sorted { color:var(--accent); }
.player-row { display:grid; grid-template-columns: 40px 2fr 80px 1fr 100px 100px 80px 80px 80px; gap:0; padding:10px 16px; border-bottom:1px solid rgba(30,42,58,0.5); transition:background 0.15s; align-items:center; }
.player-row:hover { background:rgba(245,158,11,0.04); }
.player-row:last-child { border-bottom:none; }

/* RANK */
.rank { font-size:0.75rem; color:var(--text3); font-weight:600; text-align:center; }
.rank-1 { color:var(--accent); }
.rank-2 { color:#94a3b8; }
.rank-3 { color:#cd7f32; }

/* PLAYER NAME */
.player-info { display:flex; align-items:center; gap:10px; }
.player-name { font-size:0.9rem; font-weight:500; color:var(--text); }
.player-club { font-size:0.75rem; color:var(--text3); }
.status-icons { display:flex; gap:4px; }
.injured-icon { font-size:0.7rem; background:rgba(239,68,68,0.2); color:var(--red); border-radius:3px; padding:1px 5px; }
.sanction-icon { font-size:0.7rem; background:rgba(245,158,11,0.2); color:var(--accent); border-radius:3px; padding:1px 5px; }

/* POSITION BADGE */
.pos-badge {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; color:white;
  flex-shrink:0; overflow:hidden;
}
.pos-PT { background:var(--pt); }
.pos-DF { background:var(--df); }
.pos-MC { background:var(--mc); }
.pos-DL { background:var(--dl); }
.pos-MD { background:var(--md); }
.pos-multi { display:flex; flex-direction:column; align-items:stretch; }
.pos-multi span { flex:1; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:800; color:white; }

/* PRICE */
.price { font-size:0.9rem; font-weight:600; color:var(--text); }

/* TREND */
.trend { font-size:0.8rem; font-weight:600; }
.trend.up { color:var(--green); }
.trend.down { color:var(--red); }
.trend.neutral { color:var(--text3); }

/* POINTS */
.points { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; color:var(--accent); letter-spacing:1px; }

/* ROI */
.roi { font-size:0.85rem; font-weight:600; }
.roi.high { color:var(--green); }
.roi.mid { color:var(--accent); }
.roi.low { color:var(--text3); }

/* PLAYED */
.played { font-size:0.85rem; color:var(--text2); text-align:center; }

/* PAGINATION */
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:1.5rem; flex-wrap:wrap; }
.page-btn { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:8px 14px; color:var(--text2); font-family:'DM Sans',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; }
.page-btn:hover { border-color:var(--accent); color:var(--accent); }
.page-btn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
.page-info { font-size:0.8rem; color:var(--text3); padding:0 8px; }

/* SECTION TITLE */
.section-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--text); letter-spacing:2px; margin-bottom:1.5rem; display:flex; align-items:center; gap:12px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }
.player-count { font-family:'DM Sans',sans-serif; font-size:0.8rem; color:var(--text3); font-weight:400; letter-spacing:0; }

/* ERROR */
.error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:8px; padding:16px 20px; color:#fca5a5; font-size:0.9rem; margin:1rem 0; }
</style>

// ============================================================

const GROUPS = [

  ]},
];

const MY_TEAM = [
  { name:'Lamine Yamal', pos:'DL', pts:217, price:'27.36M€', status:'✅' },
  { name:'Ez Abde', pos:'DL', pts:117, price:'8.54M€', status:'✅' },
  { name:'Unai Simón', pos:'PT', pts:116, price:'11.76M€', status:'✅' },
  { name:'Remiro', pos:'PT', pts:106, price:'6.86M€', status:'🔴 VENDER' },
  { name:'Ratiu', pos:'DF', pts:105, price:'5.23M€', status:'✅' },
  { name:'Viñas', pos:'MC', pts:110, price:'7.18M€', status:'✅' },
  { name:'Ounahi', pos:'MC', pts:94, price:'5.91M€', status:'✅' },
  { name:'Jon Pacheco', pos:'DF', pts:81, price:'4.12M€', status:'✅' },
  { name:'Trent', pos:'DF', pts:35, price:'9.43M€', status:'🔴 VENDER' },
  { name:'Roony', pos:'MC', pts:51, price:'3.87M€', status:'✅' },
  { name:'Unai Núñez', pos:'DF', pts:20, price:'2.54M€', status:'⚠️' },
  { name:'Raúl Moro', pos:'DL', pts:16, price:'3.21M€', status:'⚠️' },
  { name:'Paco Cortés', pos:'DF', pts:19, price:'1.98M€', status:'⚠️' },
  { name:'Ángel Pérez', pos:'MC', pts:13, price:'1.43M€', status:'⚠️' },
  { name:'Selton Sánchez', pos:'DL', pts:11, price:'1.12M€', status:'⚠️' },
];

// ============================================================
// STATE
// ============================================================
let allPlayers = [];
let filteredPlayers = [];
let currentPos = '';
let currentSort = 'points_desc';
let currentPage = 1;
const PAGE_SIZE = 50;
let isLoading = false;

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderGeneral();
  renderGrupos();
  renderMiEquipo();
  loadPlayers();
});

// ============================================================
// LOAD PLAYERS FROM COMUNIATE
// ============================================================
async function loadPlayers() {
  isLoading = true;
  document.getElementById('jugadores-loading').style.display = 'flex';
  document.getElementById('jugadores-content').style.display = 'none';

  try {
    const html = await fetchPage(1);
    // detect total pages
    const pageMatch = html.match(/ir a p.gina (\d+)/g);
    let totalPages = 1;
    if (pageMatch) {
      const nums = pageMatch.map(m => parseInt(m.match(/\d+/)[0]));
      totalPages = Math.max(...nums);
    }

    const players = parsePlayers(html);
    
    // fetch remaining pages
    const promises = [];
    for (let p = 2; p <= Math.min(totalPages, 22); p++) {
      promises.push(fetchPage(p).then(parsePlayers));
    }
    const results = await Promise.all(promises);
    results.forEach(r => players.push(...r));

    allPlayers = players;
    filteredPlayers = [...allPlayers];
    sortPlayers();

    document.getElementById('jugadores-loading').style.display = 'none';
    document.getElementById('jugadores-content').style.display = 'block';
    document.getElementById('statusText').textContent = `${allPlayers.length} jugadores · Actualizado ahora`;
    renderStats();
  } catch(e) {
    document.getElementById('jugadores-loading').innerHTML = `<div class="error-msg">❌ Error cargando jugadores: ${e.message}</div>`;
    document.getElementById('statusText').textContent = 'Error';
  }
  isLoading = false;
}

async function fetchPage(page) {
  const params = new URLSearchParams({
    operacion:'1', nombre:'', id_equipo:'0',
    posicion:'0', 'precio-min':'0', 'precio-max':'29000000',
    modo:'biwenger', limite:'0', ordenar:'0', pagina: String(page)
  });
  const res = await fetch('https://www.comuniate.com/ajax/jugadores/comunio_jugadores.php', {
    method:'POST',
    headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
    body: params.toString()
  });
  return res.text();
}

function parsePlayers(html) {
  const players = [];
  const blocks = html.split('ficha_jugador');
  for (let i = 1; i < blocks.length; i++) {
    const b = blocks[i];
    const nameMatch = b.match(/class="titulo_ficha_jugador">([^<]+)<\/span>/);
    if (!nameMatch) continue;
    const priceMatch = b.match(/<small>([\d.]+)€<\/small>/);
    const posMatch = b.match(/label-danger">\s*([A-Z\/]+)\s*/);
    const pointsMatch = b.match(/label-primary">(\d+)<\/span>/);
    const clubMatch = b.match(/alt="([^"]+)"[^>]*>\s*<\/div>/);
    const injuredMatch = b.match(/estados\/lesionado/);
    const sanctionMatch = b.match(/estados\/sancionado/);
    const homeMatch = b.match(/fa-home[^>]*><\/i>\s*(\d+)/);
    const awayMatch = b.match(/fa-plane[^>]*><\/i>\s*(\d+)/);
    const trendMatch = b.match(/([+\-][\d.]+)€<\/div>/);

    const price = priceMatch ? parseInt(priceMatch[1].replace(/\./g,'')) : 0;
    const pts = pointsMatch ? parseInt(pointsMatch[1]) : 0;
    const roi = price > 0 ? (pts / (price/1000000)).toFixed(2) : 0;
    const trend = trendMatch ? parseInt(trendMatch[1].replace(/\./g,'')) : 0;

    players.push({
      name: nameMatch[1].trim(),
      price, pts, roi: parseFloat(roi),
      position: posMatch ? posMatch[1].trim() : '?',
      club: clubMatch ? clubMatch[1].trim() : '—',
      injured: !!injuredMatch,
      sanctioned: !!sanctionMatch,
      playedHome: homeMatch ? parseInt(homeMatch[1]) : 0,
      playedAway: awayMatch ? parseInt(awayMatch[1]) : 0,
      trend
    });
  }
  return players;
}

// ============================================================
// RENDER STATS
// ============================================================
function renderStats() {
  const total = allPlayers.length;
  const avgPts = (allPlayers.reduce((s,p)=>s+p.pts,0)/total).toFixed(0);
  const maxPts = Math.max(...allPlayers.map(p=>p.pts));
  const injured = allPlayers.filter(p=>p.injured).length;
  const rising = allPlayers.filter(p=>p.trend>0).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Jugadores</div><div class="stat-value">${total}</div><div class="stat-sub">en el mercado</div></div>
    <div class="stat-card"><div class="stat-label">Puntos máx</div><div class="stat-value">${maxPts}</div><div class="stat-sub">mejor puntuación</div></div>
    <div class="stat-card"><div class="stat-label">Media pts</div><div class="stat-value">${avgPts}</div><div class="stat-sub">promedio liga</div></div>
    <div class="stat-card"><div class="stat-label">Lesionados</div><div class="stat-value">${injured}</div><div class="stat-sub">fuera de juego</div></div>
    <div class="stat-card"><div class="stat-label">Subiendo</div><div class="stat-value">${rising}</div><div class="stat-sub">tendencia positiva</div></div>
  `;
}

// ============================================================
// POSITION BADGE
// ============================================================
function posBadge(pos) {
  if (!pos || pos === '?') return `<div class="pos-badge" style="background:var(--border);font-size:9px;color:var(--text3)">?</div>`;
  
  const colors = { PT:'var(--pt)', DF:'var(--df)', MC:'var(--mc)', DL:'var(--dl)', MD:'var(--md)' };
  const parts = pos.split('/').filter(p=>p);
  
  if (parts.length === 1) {
    const c = colors[parts[0]] || 'var(--text3)';
    return `<div class="pos-badge" style="background:${c}">${parts[0]}</div>`;
  }
  
  const gradStops = parts.map((p,i) => {
    const c = colors[p] || '#666';
    const pct1 = (i/parts.length*100).toFixed(0);
    const pct2 = ((i+1)/parts.length*100).toFixed(0);
    return `${c} ${pct1}%, ${c} ${pct2}%`;
  }).join(', ');
  
  const labels = parts.map(p=>`<span>${p}</span>`).join('');
  return `<div class="pos-badge pos-multi" style="background:linear-gradient(180deg,${gradStops})">${labels}</div>`;
}

// ============================================================
// FORMAT
// ============================================================
function fmtPrice(v) {
  if (!v) return '—';
  if (v >= 1000000) return (v/1000000).toFixed(2)+'M€';
  return (v/1000).toFixed(0)+'K€';
}

function fmtTrend(v) {
  if (!v || v===0) return `<span class="trend neutral">—</span>`;
  if (v>0) return `<span class="trend up">+${fmtPrice(v)}</span>`;
  return `<span class="trend down">${fmtPrice(v)}</span>`;
}

function roiClass(r) {
  if (r >= 15) return 'high';
  if (r >= 8) return 'mid';
  return 'low';
}

// ============================================================
// FILTER & SORT
// ============================================================
function filterPos(pos, btn) {
  currentPos = pos;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterPlayers() {
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredPlayers = allPlayers.filter(p => {
    const matchPos = !currentPos || p.position.includes(currentPos);
    const matchSearch = !q || p.name.toLowerCase().includes(q) || (p.club||'').toLowerCase().includes(q);
    return matchPos && matchSearch;
  });
  sortAndRender();
}

function setSortAndRender(val) {
  document.getElementById('sortSelect').value = val;
  currentSort = val;
  sortAndRender();
}

function sortPlayers() {
  currentSort = document.getElementById('sortSelect').value;
  currentPage = 1;
  sortAndRender();
}

function sortAndRender() {
  const [key, dir] = currentSort.split('_');
  filteredPlayers.sort((a,b) => {
    let va = key==='roi' ? a.roi : key==='trend' ? a.trend : key==='price' ? a.price : a.pts;
    let vb = key==='roi' ? b.roi : key==='trend' ? b.trend : key==='price' ? b.price : b.pts;
    return dir==='desc' ? vb-va : va-vb;
  });
  renderPlayers();
}

// ============================================================
// RENDER PLAYERS
// ============================================================
function renderPlayers() {
  const total = filteredPlayers.length;
  document.getElementById('playerCount').textContent = `${total} jugadores`;

  const start = (currentPage-1)*PAGE_SIZE;
  const pageData = filteredPlayers.slice(start, start+PAGE_SIZE);

  const html = pageData.map((p, idx) => {
    const rank = start + idx + 1;
    const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
    return `
    <div class="player-row">
      <div class="rank ${rankClass}">${rank}</div>
      <div class="player-info">
        <div>
          <div class="player-name">${p.name}${p.injured?' <span class="injured-icon">LES</span>':''}${p.sanctioned?' <span class="sanction-icon">SAN</span>':''}</div>
          <div class="player-club">${p.club}</div>
        </div>
      </div>
      <div>${posBadge(p.position)}</div>
      <div class="player-club" style="font-size:0.85rem">${p.club}</div>
      <div class="points">${p.pts||'—'}</div>
      <div>
        <div class="price">${fmtPrice(p.price)}</div>
        <div style="margin-top:2px">${fmtTrend(p.trend)}</div>
      </div>
      <div class="roi ${roiClass(p.roi)}">${p.roi>0?p.roi+'x':'—'}</div>
      <div class="played">${p.playedHome||'—'}</div>
      <div class="played">${p.playedAway||'—'}</div>
    </div>`;
  }).join('');

  document.getElementById('playersList').innerHTML = html || '<div style="padding:40px;text-align:center;color:var(--text3)">No se encontraron jugadores</div>';
  renderPagination(total);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total/PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">←</button>`;
  
  for (let p=1; p<=totalPages; p++) {
    if (p===1||p===totalPages||Math.abs(p-currentPage)<=2) {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    } else if (Math.abs(p-currentPage)===3) {
      html += `<span class="page-info">...</span>`;
    }
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">→</button>`;
  
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderPlayers();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ============================================================
// RENDER GENERAL
// ============================================================
function renderGeneral() {
  document.getElementById('generalList').innerHTML = STANDINGS.map(t => `
    <div class="player-row" style="grid-template-columns:40px 2fr 100px 120px 80px">
      <div class="rank ${t.pos===1?'rank-1':t.pos===2?'rank-2':t.pos===3?'rank-3':''}">${t.pos}</div>
      <div class="player-name">${t.name}</div>
      <div class="points">${t.pts}</div>
      <div class="price">${t.value}</div>
      <div class="played">${t.players}</div>
    </div>`).join('');
}

// ============================================================
// RENDER GRUPOS
// ============================================================

    <div style="margin-bottom:2rem">

      <div class="table-wrap">
        <div style="display:grid;grid-template-columns:40px 2fr 60px 60px 60px 60px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);">
          <div class="th">#</div><div class="th">EQUIPO</div>
          <div class="th">PTS</div><div class="th">G</div><div class="th">E</div><div class="th">P</div>
        </div>
        ${g.teams.map((t,i)=>`
        <div class="player-row" style="grid-template-columns:40px 2fr 60px 60px 60px 60px">
          <div class="rank ${i===0?'rank-1':i===1?'rank-2':''}">${i+1}</div>
          <div class="player-name">${t.name}</div>
          <div class="points" style="font-size:1rem">${t.pts}</div>
          <div class="played">${t.w}</div>
          <div class="played">${t.d}</div>
          <div class="played">${t.l}</div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

// ============================================================
// RENDER MI EQUIPO
// ============================================================
function renderMiEquipo() {

  document.getElementById('miequipoContent').innerHTML = `
    <div class="table-wrap">
      <div style="display:grid;grid-template-columns:40px 2fr 80px 100px 100px 150px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);">
        <div class="th">#</div><div class="th">JUGADOR</div>
        <div class="th">POS</div><div class="th">PTS</div>
        <div class="th">VALOR</div><div class="th">ESTADO</div>
      </div>
      ${sorted.map((p,i)=>`
      <div class="player-row" style="grid-template-columns:40px 2fr 80px 100px 100px 150px">
        <div class="rank">${i+1}</div>

        <div>${posBadge(p.pos)}</div>
        <div class="points">${p.pts}</div>
        <div class="price">${p.price}</div>
        <div style="font-size:0.85rem">${p.status}</div>

}

// ============================================================
// NAVIGATION
// ============================================================
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
</script>
