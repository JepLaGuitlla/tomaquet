name: Actualizar datos La Pausa Fantasy

on:
  schedule:
    # Una vez al día a las 07:00 UTC (9h España en verano, 8h en invierno)
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar secrets configurados
        run: |
          echo "BIWENGER_EMAIL set:    ${{ secrets.BIWENGER_EMAIL != '' }}"
          echo "BIWENGER_PASSWORD set: ${{ secrets.BIWENGER_PASSWORD != '' }}"
          echo "API_FOOTBALL_KEY set:  ${{ secrets.API_FOOTBALL_KEY != '' }}"

      - name: Ejecutar script de datos
        env:
          BIWENGER_EMAIL:     ${{ secrets.BIWENGER_EMAIL }}
          BIWENGER_PASSWORD:  ${{ secrets.BIWENGER_PASSWORD }}
          BIWENGER_LEAGUE_ID: ${{ secrets.BIWENGER_LEAGUE_ID }}
          API_FOOTBALL_KEY:   ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-biwenger.js

      - name: Guardar data.json en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "datos: actualización $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
